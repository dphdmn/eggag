<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Eggag</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            box-sizing: border-box;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            font-family: 'Press Start 2P', sans-serif;
            touch-action: none;
        }

        #app {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9 / 16;
            position: relative;
            overflow: hidden;
            background: #111;
            user-select: none;
            -webkit-user-select: none;
            border-radius: 0;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        #bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.png');
            background-size: auto 100%;
            background-repeat: repeat-x;
            animation: scrollBg 10s linear infinite;
            z-index: 1;
            pointer-events: none;
            image-rendering: pixelated;
        }

        @keyframes scrollBg {
            0% { background-position-x: 0; }
            100% { background-position-x: -100%; }
        }

        #panels {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            touch-action: none;
        }

        .panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: transform 2s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 10;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            touch-action: none;
        }

        .panel.active {
            display: flex;
        }

        .panel img.logo {
            width: 80%;
            max-width: 280px;
            margin-top: -15%;
            image-rendering: pixelated;
            pointer-events: none;
        }

        button {
            margin-top: 8%;
            padding: 4% 12%;
            font-family: 'Press Start 2P', sans-serif;
            font-size: clamp(16px, 6vw, 22px);
            color: white;
            background: #ff3366;
            border: 4px solid white;
            box-shadow: 0 6px 0 #aa1133;
            cursor: pointer;
            transition: all 0.1s;
            text-shadow: 2px 2px 0 #000;
            user-select: none;
            touch-action: manipulation;
            border-radius: 0;
            -webkit-appearance: none;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #aa1133;
        }

        #game-panel {
            justify-content: flex-start;
            padding-top: 12%;
            position: relative;
        }

        #board-container {
            position: relative;
            width: min(330px, 85%);
            aspect-ratio: 1/1;
            background: url('board.png') no-repeat center center;
            background-size: 100% 100%;
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
            margin: 4% auto;
            touch-action: none;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            background: transparent;
            touch-action: none;
            pointer-events: auto;
        }

        #game-header {
            position: absolute;
            top: 5%;
            width: 100%;
            text-align: center;
            font-size: clamp(12px, 4vw, 18px);
            color: white;
            text-shadow: 3px 3px 0 #000;
            z-index: 20;
            pointer-events: none;
        }

        #score-display {
            position: absolute;
            bottom: 10%;
            width: 100%;
            text-align: center;
            font-size: clamp(20px, 7vw, 28px);
            color: #ffff00;
            text-shadow: 4px 4px 0 #000;
            z-index: 20;
            pointer-events: none;
        }

        #game-actions {
            position: absolute;
            bottom: 2%;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 30;
            pointer-events: none;
        }

        #game-actions button {
            margin: 0;
            padding: 8px 12px;
            font-size: clamp(10px, 3vw, 14px);
            background: #333;
            border: 3px solid #aaa;
            box-shadow: 0 4px 0 #111;
            min-width: 100px;
            pointer-events: auto;
        }

        #game-actions button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #111;
        }

        #end-panel {
            text-align: center;
        }

        #end-panel h1 {
            font-size: clamp(24px, 8vw, 36px);
            margin-bottom: 5%;
            text-shadow: 4px 4px 0 #000;
        }

        #end-panel p {
            font-size: clamp(14px, 5vw, 22px);
            margin: 3% 0;
        }

        img {
            -webkit-user-drag: none;
            user-drag: none;
            pointer-events: none;
        }

        #mode-panel > div {
            margin-top: 15%;
            display: flex;
            flex-direction: column;
            gap: 4vh;
            width: 100%;
            align-items: center;
        }

        #mode-panel button {
            width: 60%;
            min-width: 180px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="bg"></div>

        <div id="panels">
            <div class="panel active" id="menu-panel">
                <img src="logo.png" class="logo" alt="Eggag" draggable="false">
                <button onclick="playClicked()">PLAY</button>
            </div>

            <div class="panel" id="mode-panel">
                <img src="logo.png" class="logo" alt="Eggag" draggable="false">
                <div>
                    <button onclick="selectMode('timed')">TIMED</button>
                    <button onclick="selectMode('turns')">TURNS</button>
                </div>
            </div>

            <div class="panel" id="game-panel">
                <div id="game-header">
                    <span id="mode-text">TIMED</span> • <span id="remaining-text">60</span>
                </div>
                
                <div id="board-container">
                    <canvas id="canvas" width="330" height="330"></canvas>
                </div>

                <div id="score-display">SCORE: <span id="score-value">0</span></div>
                
                <div id="game-actions">
                    <button onclick="restartGame()">↺ RESTART</button>
                    <button onclick="exitToMenu()">⌂ MENU</button>
                </div>
            </div>

            <div class="panel" id="end-panel">
                <h1>GAME OVER</h1>
                <p>SCORE: <span id="final-score">0</span></p>
                <p>HIGH SCORE: <span id="high-score">0</span></p>
                <button onclick="backToMenu()" style="margin-top: 10%;">BACK</button>
            </div>
        </div>
    </div>

    <audio id="music" src="music.mp3" loop preload="auto"></audio>

    <script>
        const APP = document.getElementById('app');
        const CANVAS = document.getElementById('canvas');
        const CTX = CANVAS.getContext('2d', { alpha: true });
        
        const WIDTH = 330;
        const HEIGHT = 330;
        const OFFSET = 15;
        const CELL = 60;
        const GRID_SIZE = 5;

        let images = {};
        
        let grid = [];
        let eggScales = [];
        let wobbleOffsets = [];
        let currentChain = [];
        let particles = [];
        let floatTexts = [];
        let score = 0;
        let mode = 'timed';
        let timeLeft = 60;
        let turnsLeft = 30;
        let gameRunning = false;
        let timerActive = false;
        let gameEnding = false;
        let lastTime = 0;
        let isDragging = false;
        let highScore = localStorage.getItem('eggagHigh') || 0;
        let isTransitioning = false;

        function getCanvasCoords(e) {
            const rect = CANVAS.getBoundingClientRect();
            const scaleX = CANVAS.width / rect.width;
            const scaleY = CANVAS.height / rect.height;

            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const canvasX = Math.min(rect.right, Math.max(rect.left, clientX));
            const canvasY = Math.min(rect.bottom, Math.max(rect.top, clientY));

            const x = (canvasX - rect.left) * scaleX;
            const y = (canvasY - rect.top) * scaleY;
            return { x, y };
        }

        function playSound(src) {
            const audio = new Audio(src);
            audio.volume = 0.5;
            audio.play().catch(() => {});
        }

        function playEggSound() {
            playSound('egg.mp3');
        }

        function loadImages(callback) {
            const files = [
                'logo.png', 'board.png',
                'egg0.png', 'egg1.png',
                'egg0_cracked.png', 'egg1_cracked.png',
                'bird.png'
            ];
            let loaded = 0;

            files.forEach(src => {
                const img = new Image();
                img.onload = () => {
                    images[src.replace('.png', '')] = img;
                    loaded++;
                    if (loaded === files.length) callback();
                };
                img.src = src;
            });
        }

        function initGrid() {
            grid = [];
            eggScales = [];
            wobbleOffsets = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                let rowG = [], rowS = [], rowW = [];
                for (let c = 0; c < GRID_SIZE; c++) {
                    rowG.push(Math.random() < 0.5 ? 0 : 1);
                    rowS.push(0);
                    rowW.push(Math.random() * Math.PI * 2);
                }
                grid.push(rowG);
                eggScales.push(rowS);
                wobbleOffsets.push(rowW);
            }
        }

        let currentPanelId = 'menu-panel';

        function switchPanel(toId) {
            if (isTransitioning) return;
            isTransitioning = true;

            const oldPanel = document.getElementById(currentPanelId);
            const newPanel = document.getElementById(toId);

            if (!oldPanel || !newPanel) {
                isTransitioning = false;
                return;
            }

            newPanel.style.display = 'flex';
            newPanel.style.transition = 'none';
            newPanel.style.transform = 'translateX(100%)';
            void newPanel.offsetWidth;

            newPanel.style.transition = 'transform 2000ms cubic-bezier(0.25, 0.1, 0.25, 1)';
            newPanel.style.transform = 'translateX(0%)';

            oldPanel.style.transition = 'transform 2000ms cubic-bezier(0.25, 0.1, 0.25, 1)';
            oldPanel.style.transform = 'translateX(-100%)';

            setTimeout(() => {
                oldPanel.style.display = 'none';
                oldPanel.style.transform = 'translateX(0%)';
                currentPanelId = toId;
                isTransitioning = false;
            }, 2050);
        }

        function startGame(selectedMode) {
            mode = selectedMode;
            score = 0;
            currentChain = [];
            particles = [];
            floatTexts = [];
            isDragging = false;
            gameRunning = false;
            timerActive = false;
            gameEnding = false;

            initGrid();

            if (mode === 'timed') {
                timeLeft = 60;
                document.getElementById('mode-text').textContent = 'TIMED';
            } else {
                turnsLeft = 30;
                document.getElementById('mode-text').textContent = 'TURNS';
            }
            updateHUD();

            CTX.clearRect(0, 0, WIDTH, HEIGHT);

            playSound('game_start.mp3');

            if (currentPanelId === 'game-panel') {
                lastTime = performance.now();
                gameRunning = true;
                requestAnimationFrame(gameLoop);
                if (mode === 'timed') {
                    setTimeout(() => {
                        timerActive = true;
                    }, 450);
                }
                return;
            }

            switchPanel('game-panel');

            setTimeout(() => {
                lastTime = performance.now();
                gameRunning = true;
                requestAnimationFrame(gameLoop);

                if (mode === 'timed') {
                    setTimeout(() => {
                        timerActive = true;
                    }, 450);
                }
            }, 2050);
        }

        function updateHUD() {
            document.getElementById('score-value').textContent = score;
            if (mode === 'timed') {
                document.getElementById('remaining-text').textContent = Math.ceil(timeLeft);
            } else {
                document.getElementById('remaining-text').textContent = turnsLeft;
            }
        }

        function getCell(mx, my) {
            mx -= OFFSET;
            my -= OFFSET;
            const col = Math.floor(mx / CELL);
            const row = Math.floor(my / CELL);
            if (col < 0 || col >= GRID_SIZE || row < 0 || row >= GRID_SIZE) return null;

            const localX = mx - col * CELL;
            const localY = my - row * CELL;
            if (localX >= 5 && localX <= 55 && localY >= 5 && localY <= 55) {
                return { r: row, c: col };
            }
            return null;
        }

        function handleDragStart(e) {
            e.preventDefault();
            if (!gameRunning || gameEnding) return;

            const coords = getCanvasCoords(e);
            const cell = getCell(coords.x, coords.y);
            if (!cell) return;

            isDragging = true;
            currentChain = [cell];
            playEggSound();
        }

        function handleDragMove(e) {
            e.preventDefault();
            if (!isDragging || !gameRunning || gameEnding) return;

            const coords = getCanvasCoords(e);
            const cell = getCell(coords.x, coords.y);
            if (!cell) return;

            const last = currentChain[currentChain.length - 1];
            
            // Check if we're moving back to an already selected egg
            const existingIndex = currentChain.findIndex(p => p.r === cell.r && p.c === cell.c);
            
            if (existingIndex !== -1) {
                // If we're going back to a previous egg, trim the chain to that point
                // But only if it's the previous egg (allows smooth backtracking)
                if (existingIndex === currentChain.length - 2) {
                    // Remove the last egg (backtrack one step)
                    currentChain.pop();
                    playEggSound();
                }
                return;
            }

            const dr = Math.abs(cell.r - last.r);
            const dc = Math.abs(cell.c - last.c);

            const sameType = grid[cell.r][cell.c] === grid[last.r][last.c];
            const adjacent = (dr + dc === 1);

            if (adjacent && sameType) {
                currentChain.push(cell);
                playEggSound();
            }
        }

        function handleDragEnd(e) {
            e.preventDefault();
            if (!isDragging || !gameRunning || gameEnding) return;
            isDragging = false;

            if (currentChain.length >= 2) {
                const len = currentChain.length;
                score += len * len;
                updateHUD();

                playSound('chain.mp3');

                currentChain.forEach(pos => {
                    const cx = OFFSET + pos.c * CELL + CELL / 2;
                    const cy = OFFSET + pos.r * CELL + CELL / 2;

                    floatTexts.push({
                        x: cx,
                        y: cy - 15,
                        text: len.toString(),
                        alpha: 1,
                        vy: -85
                    });

                    for (let i = 0; i < 3; i++) {
                        const offsetX = (Math.random() - 0.5) * 26;
                        const offsetY = (Math.random() - 0.5) * 26;
                        const angle = Math.random() * Math.PI * 2;
                        const speed = 80 + Math.random() * 110;

                        particles.push({
                            x: cx + offsetX,
                            y: cy + offsetY,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed - 140,
                            rot: Math.random() * Math.PI * 2,
                            rotSpeed: (Math.random() - 0.5) * 12,
                            scale: 0.7 + Math.random() * 0.6,
                            alpha: 1,
                            life: 950
                        });
                    }

                    grid[pos.r][pos.c] = Math.random() < 0.5 ? 0 : 1;
                    eggScales[pos.r][pos.c] = 0;
                });

                if (mode === 'turns') {
                    turnsLeft--;
                    updateHUD();
                    if (turnsLeft <= 0) {
                        gameEnding = true;
                        setTimeout(endGame, 1200);
                    }
                }
            }
            currentChain = [];
        }

        CANVAS.addEventListener('mousedown', handleDragStart);
        CANVAS.addEventListener('mousemove', handleDragMove);
        CANVAS.addEventListener('mouseup', handleDragEnd);
        CANVAS.addEventListener('mouseleave', handleDragEnd);

        CANVAS.addEventListener('touchstart', handleDragStart, { passive: false });
        CANVAS.addEventListener('touchmove', handleDragMove, { passive: false });
        CANVAS.addEventListener('touchend', handleDragEnd, { passive: false });
        CANVAS.addEventListener('touchcancel', handleDragEnd, { passive: false });

        APP.addEventListener('touchstart', (e) => { if (e.target === APP) e.preventDefault(); }, { passive: false });
        APP.addEventListener('touchmove', (e) => { if (e.target === APP) e.preventDefault(); }, { passive: false });

        document.addEventListener('click', e => {
            if (e.target.tagName === 'BUTTON') {
                playSound('click.mp3');
            }
        });

        function updateEntities(delta) {
            for (let i = floatTexts.length - 1; i >= 0; i--) {
                const t = floatTexts[i];
                t.y += t.vy * (delta / 1000);
                t.alpha -= 1.8 * (delta / 1000);
                if (t.alpha <= 0) floatTexts.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * (delta / 1000);
                p.y += p.vy * (delta / 1000);
                p.vy += 120 * (delta / 1000);
                p.vx *= 0.975;
                p.vy *= 0.96;
                p.rot += p.rotSpeed * (delta / 1000);
                p.scale *= 0.975;
                p.life -= delta;
                p.alpha = Math.max(0, p.life / 950);
                if (p.life <= 0) particles.splice(i, 1);
            }

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (eggScales[r][c] < 1) {
                        eggScales[r][c] = Math.min(1, eggScales[r][c] + delta / 380);
                    }
                }
            }

            if (gameRunning && mode === 'timed' && timerActive) {
                timeLeft -= delta / 1000;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    endGame();
                }
                updateHUD();
            }
        }

        function draw(now) {
            CTX.clearRect(0, 0, WIDTH, HEIGHT);

            if (currentChain.length > 1) {
                CTX.strokeStyle = '#ffffff';
                CTX.lineWidth = 11;
                CTX.lineCap = 'round';
                CTX.shadowBlur = 12;
                CTX.shadowColor = '#ffffff';
                CTX.beginPath();
                for (let i = 0; i < currentChain.length; i++) {
                    const p = currentChain[i];
                    const x = OFFSET + p.c * CELL + CELL / 2;
                    const y = OFFSET + p.r * CELL + CELL / 2;
                    if (i === 0) CTX.moveTo(x, y);
                    else CTX.lineTo(x, y);
                }
                CTX.stroke();
                CTX.shadowBlur = 0;
            }

            const time = now / 280;
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const type = grid[r][c];
                    const scale = eggScales[r][c];
                    if (scale === 0) continue;

                    const cx = OFFSET + c * CELL + CELL / 2;
                    const cy = OFFSET + r * CELL + CELL / 2;

                    const wobble = Math.sin(time + wobbleOffsets[r][c]) * 9 * Math.PI / 180;

                    CTX.save();
                    CTX.translate(cx, cy);
                    CTX.rotate(wobble);

                    let isCracked = false;
                    for (let p of currentChain) {
                        if (p.r === r && p.c === c) {
                            isCracked = true;
                            break;
                        }
                    }

                    const key = (type === 0 ? 'egg0' : 'egg1') + (isCracked ? '_cracked' : '');
                    const img = images[key];

                    const drawSize = 54 * scale;
                    CTX.drawImage(img, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
                    CTX.restore();
                }
            }

            CTX.textAlign = 'center';
            CTX.textBaseline = 'middle';
            CTX.font = 'bold 26px "Press Start 2P"';
            for (let t of floatTexts) {
                CTX.globalAlpha = Math.max(0, t.alpha);
                CTX.fillStyle = '#ffff66';
                CTX.fillText(t.text, t.x, t.y);
            }
            CTX.globalAlpha = 1;

            for (let p of particles) {
                CTX.save();
                CTX.translate(p.x, p.y);
                CTX.rotate(p.rot);
                CTX.globalAlpha = p.alpha;
                CTX.scale(p.scale, p.scale);
                CTX.drawImage(images.bird, -18, -18, 36, 36);
                CTX.restore();
            }
        }

        function gameLoop(now) {
            if (!gameRunning) return;

            const delta = Math.min(now - lastTime, 80);
            lastTime = now;

            updateEntities(delta);
            draw(now);

            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameRunning = false;
            gameEnding = false;
            const finalScoreEl = document.getElementById('final-score');
            const highScoreEl = document.getElementById('high-score');

            finalScoreEl.textContent = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('eggagHigh', highScore);
            }
            highScoreEl.textContent = highScore;

            switchPanel('end-panel');
        }

        function restartGame() {
            if (!gameRunning && currentPanelId !== 'game-panel') return;
            
            gameRunning = false;
            gameEnding = false;
            isDragging = false;
            timerActive = false;
            
            score = 0;
            currentChain = [];
            particles = [];
            floatTexts = [];
            
            initGrid();
            
            if (mode === 'timed') {
                timeLeft = 60;
            } else {
                turnsLeft = 30;
            }
            
            updateHUD();
            CTX.clearRect(0, 0, WIDTH, HEIGHT);
            
            lastTime = performance.now();
            gameRunning = true;
            requestAnimationFrame(gameLoop);
            
            if (mode === 'timed') {
                setTimeout(() => {
                    timerActive = true;
                }, 450);
            }
            
            playSound('game_start.mp3');
        }

        function exitToMenu() {
            gameRunning = false;
            gameEnding = false;
            isDragging = false;
            timerActive = false;
            switchPanel('menu-panel');
        }

        function playClicked() {
            switchPanel('mode-panel');
        }

        function selectMode(selectedMode) {
            startGame(selectedMode);
        }

        function backToMenu() {
            switchPanel('menu-panel');
        }

        window.playClicked = playClicked;
        window.selectMode = selectMode;
        window.backToMenu = backToMenu;
        window.restartGame = restartGame;
        window.exitToMenu = exitToMenu;

        document.addEventListener('click', function initMusic() {
            const musicEl = document.getElementById('music');
            musicEl.volume = 0.4;
            musicEl.play().catch(() => {});
            document.removeEventListener('click', initMusic);
        }, { once: true });

        function initialize() {
            loadImages(() => {
                document.getElementById('menu-panel').classList.add('active');
            });
        }

        window.onload = initialize;
    </script>
</body>
</html>
